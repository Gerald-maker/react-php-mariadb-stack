name: Fast CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  backend-build:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: demo
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (fast cache)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          tags: backend:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run backend container
        run: |
          docker run -d --name backend_container -p 8000:80 \
            -e DB_HOST=host.docker.internal \
            -e DB_NAME=demo \
            -e DB_USER=root \
            -e DB_PASSWORD=root \
            backend:latest

      - name: Wait for backend
        run: |
          echo "Checking backend health..."

          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000 || echo "000")

            if [ "$STATUS" = "200" ]; then
              echo "Backend ready"
              exit 0
            fi

            sleep 2
          done

          echo "Backend failed"
          docker logs backend_container
          exit 1


  frontend-build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build