name: Docker Full-Stack CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: demo
        ports: []  # no host port mapping
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend container
        run: docker build -t simple-devop-demo-backend ./backend

      - name: Build frontend container
        run: docker build -t simple-devop-demo-frontend ./frontend

      - name: Start Docker Compose
        run: docker compose up -d

      - name: Wait for backend & test API
        run: |
          for i in {1..20}; do
            RESPONSE=$(docker compose exec -T backend curl -s http://localhost || echo "")
            if [[ "$RESPONSE" == *"Alice"* ]]; then
              echo "Backend test passed."
              exit 0
            fi
            echo "Waiting for backend to be ready..."
            sleep 5
          done
          echo "Backend test failed! Backend did not return expected data."
          exit 1

      - name: Tear down
        run: docker compose down