name: Fast CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: demo
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t backend ./backend

      - name: Run backend container
        run: |
          docker run -d --name backend_container -p 8000:80 \
            -e DB_HOST=host.docker.internal \
            -e DB_NAME=demo \
            -e DB_USER=root \
            -e DB_PASSWORD=root \
            backend

      - name: Show running containers
        run: docker ps

      - name: Show backend logs
        run: docker logs backend_container

      - name: Test backend API
        run: |
          for i in {1..10}; do
            echo "Attempt $i"
            curl -v http://localhost:8000 || true
            sleep 3
          done