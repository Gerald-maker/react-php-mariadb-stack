name: Fast CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: demo
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start backend server
        run: |
          docker build -t backend ./backend
          docker run -d -p 8000:80 \
            -e DB_HOST=localhost \
            -e DB_NAME=demo \
            -e DB_USER=root \
            -e DB_PASSWORD=root \
            backend

      - name: Wait for backend
        run: |
          for i in {1..10}; do
            RESPONSE=$(curl -s http://localhost:8000 || echo "")
            if [[ "$RESPONSE" == *"Alice"* ]]; then
              echo "Backend test passed"
              exit 0
            fi
            sleep 2
          done
          echo "Backend test failed"
          exit 1